<!DOCTYPE html>
<html>
<head>
    <title>School Result Table</title>

    <style>
        body {
            font-family: Arial;         
            background-color: #ffffff;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            margin: 30px auto;
        }

        caption {
            font-size: 20px;
            font-weight: bold;
            margin: 10px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: lightblue;         }

        tr {
            background-color: #ffffff;  
        }
    </style>
</head>

<body>

<table>

    <caption>Class 12th School Result</caption>

    <tr>
        <th rowspan="2">Roll No</th>
        <th rowspan="2">Name</th>
        <th colspan="3">Marks</th>
        <th rowspan="2">Total</th>
    </tr>

    <tr>
        <th>Mathematics</th>
        <th>physics</th>
        <th>chemistry</th>
    </tr>


    <tr>
        <td>1</td>
        <td>Anuj</td>
        <td>80</td>
        <td>75</td>
        <td>90</td>
        <td>245</td>
    </tr>

    <tr>
        <td>2</td>
        <td>Rahul</td>
        <td>85</td>
        <td>88</td>
        <td>84</td>
        <td>257</td>
    </tr>

    <tr>
        <td>3</td>
        <td>Mukesh</td>
        <td>70</td>
        <td>72</td>
        <td>68</td>
        <td>210</td>
    </tr>

</table>

</body>
</html>
